# Deploy API (App Service zip) + web (Azure Static Web Apps) after infra exists.
# Runs manually by default. To deploy on every push to main, add:
#   push: { branches: [main] }
name: Azure — deploy apps

on:
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish API
        run: dotnet publish src/Api/Api.csproj -c Release -o "${{ github.workspace }}/publish-api"
        working-directory: backend

      - name: Zip package
        run: (cd "${{ github.workspace }}/publish-api" && zip -r "${{ github.workspace }}/api.zip" .)

      - name: Deploy to Web App
        uses: azure/cli@v2
        with:
          azcliversion: azure-cli/latest
          inlineScript: |
            az webapp deploy \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --type zip \
              --src-path "${{ github.workspace }}/api.zip" \
              --timeout 600000

  web:
    needs: api
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web (API URL baked in)
        run: npm ci && npm run build
        working-directory: web

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: web/dist
          api_location: ""
          output_location: ""
