# Purpose: validate every push/PR — .NET API compiles and tests pass; Vite web production build succeeds.
# Trigger: push and pull_request to main or master.
# See: .github/workflows/README.md
name: CI — backend tests & web build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Test (Release)
        run: dotnet test --no-build -c Release --verbosity normal

  web:
    name: Web (Vite)
    runs-on: ubuntu-latest
    env:
      # Optional: set repo secret VITE_API_URL so CI build matches production API base URL.
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_MVP_MODE: "true"
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Production build
        run: npm run build
