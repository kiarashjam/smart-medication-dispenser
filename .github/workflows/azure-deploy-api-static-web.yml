# Purpose: publish the .NET API to Azure App Service (zip) and upload the Vite build to Azure Static Web Apps.
# Trigger: manual only by default. Order: API job first, then web (so SWA build can use VITE_API_URL secret).
# Secrets: AZURE_CREDENTIALS, AZURE_RESOURCE_GROUP, AZURE_WEBAPP_NAME, VITE_API_URL, AZURE_STATIC_WEB_APPS_API_TOKEN.
# See: azure/README.md and .github/workflows/README.md
name: Azure — deploy API & static web

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api:
    name: API — publish & zip deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish API (Release)
        run: dotnet publish src/Api/Api.csproj -c Release -o "${{ github.workspace }}/publish-api"
        working-directory: backend

      - name: Zip published output
        run: (cd "${{ github.workspace }}/publish-api" && zip -r "${{ github.workspace }}/api.zip" .)

      - name: Deploy zip to App Service
        uses: azure/cli@v2
        with:
          azcliversion: azure-cli/latest
          inlineScript: |
            az webapp deploy \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --type zip \
              --src-path "${{ github.workspace }}/api.zip" \
              --timeout 600000

  web:
    name: Web — build & Static Web Apps
    needs: api
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build (VITE_API_URL from secrets)
        run: npm ci && npm run build
        working-directory: web

      - name: Upload dist to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: web/dist
          api_location: ""
          output_location: ""
