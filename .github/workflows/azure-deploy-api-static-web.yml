# Purpose: publish the .NET API to Azure App Service (zip) and upload the Vite build to Azure Static Web Apps.
# Trigger: manual only (workflow_dispatch). Push trigger removed so pushes do not fail when AZURE_* secrets are unset.
# To deploy on every push after secrets exist, add a `push:` block back (see comment at bottom of this file).
# Order: API job first, then web (SWA build uses VITE_API_URL secret).
# Secrets: AZURE_CREDENTIALS, AZURE_RESOURCE_GROUP, AZURE_WEBAPP_NAME, VITE_API_URL, AZURE_STATIC_WEB_APPS_API_TOKEN.
# See: azure/README.md and .github/workflows/README.md
name: Azure — deploy API & static web

on:
  workflow_dispatch:

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API — publish & zip deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fails fast with a clear message if the secret is missing (avoids cryptic azure/login errors).
      - name: Verify AZURE_CREDENTIALS secret
        shell: bash
        env:
          AZURE_CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          if [ -z "$AZURE_CREDS" ]; then
            echo "::error::Repository secret AZURE_CREDENTIALS is not set or is empty."
            echo "Add it: GitHub repo → Settings → Secrets and variables → Actions → New repository secret."
            echo "Value: full JSON from az ad sp create-for-rbac --sdk-auth (see azure/README.md — Troubleshooting)."
            exit 1
          fi
          if ! echo "$AZURE_CREDS" | jq -e '.clientId and .clientSecret and .subscriptionId and .tenantId' >/dev/null 2>&1; then
            echo "::error::AZURE_CREDENTIALS must be JSON with camelCase keys: clientId, clientSecret, subscriptionId, tenantId."
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish API (Release)
        run: dotnet publish src/Api/Api.csproj -c Release -o "${{ github.workspace }}/publish-api"
        working-directory: backend

      - name: Zip published output
        run: (cd "${{ github.workspace }}/publish-api" && zip -r "${{ github.workspace }}/api.zip" .)

      - name: Deploy zip to App Service
        uses: azure/cli@v2
        with:
          azcliversion: azure-cli/latest
          inlineScript: |
            az webapp deploy \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
              --type zip \
              --src-path "${{ github.workspace }}/api.zip" \
              --timeout 600000

  web:
    name: Web — build & Static Web Apps
    needs: api
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_MVP_MODE: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install & build (VITE_API_URL from secrets)
        run: npm ci && npm run build
        working-directory: web

      - name: Upload dist to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: web/dist
          api_location: ""
          output_location: ""

# Optional — deploy on push after all Azure secrets are set in repo Settings:
# on:
#   workflow_dispatch:
#   push:
#     branches: [main, master]
#     paths: ["backend/**", "web/**", ".github/workflows/azure-deploy-api-static-web.yml"]
