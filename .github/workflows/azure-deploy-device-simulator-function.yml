# Publishes the .NET 8 isolated device simulator to an existing Azure Function App (zip deploy).
# Create the Function App first: infrastructure/device-simulator/deploy-device-simulator.ps1 or Portal.
#
# Secrets (repository → Settings → Secrets → Actions):
#   AZURE_CREDENTIALS                      — same JSON as other Azure workflows
#   AZURE_DEVICE_SIMULATOR_RESOURCE_GROUP  — e.g. rg-smd-device-simulator
#   AZURE_DEVICE_SIMULATOR_FUNCTION_NAME   — e.g. func-smd-sim-xxxx
#
# App settings (Portal → Function App → Configuration) are not changed by this workflow;
# set DISPENSER_API_BASE, DISPENSER_DEVICE_ID, DISPENSER_DEVICE_JWT (or X_API_KEY) there.
name: Azure — deploy device simulator Function

on:
  workflow_dispatch:

concurrency:
  group: azure-device-sim-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  device-simulator:
    name: Device simulator — publish & zip deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify and normalize AZURE_CREDENTIALS for azure/login@v3
        id: azure_creds
        shell: bash
        env:
          AZURE_CREDS: ${{ secrets.AZURE_CREDENTIALS }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/normalize-azure-credentials.sh"

      - name: Azure login
        uses: azure/login@v3
        with:
          creds: ${{ steps.azure_creds.outputs.creds }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Function (Release)
        run: dotnet publish device-simulator-function/DeviceSimulatorFunction.csproj -c Release -o "${{ github.workspace }}/publish-device-sim"

      - name: Zip published output
        run: (cd "${{ github.workspace }}/publish-device-sim" && zip -r "${{ github.workspace }}/device-sim.zip" .)

      - name: Deploy zip to Function App
        uses: azure/cli@v2
        with:
          azcliversion: azure-cli/latest
          inlineScript: |
            az functionapp deployment source config-zip \
              --resource-group "${{ secrets.AZURE_DEVICE_SIMULATOR_RESOURCE_GROUP }}" \
              --name "${{ secrets.AZURE_DEVICE_SIMULATOR_FUNCTION_NAME }}" \
              --src "${{ github.workspace }}/device-sim.zip"

      - name: Summary
        run: |
          echo "### Device simulator deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "Function App: \`${{ secrets.AZURE_DEVICE_SIMULATOR_FUNCTION_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Invoke manually (replace \`code\` with host default key from Portal):" >> "$GITHUB_STEP_SUMMARY"
          echo "\`GET https://${{ secrets.AZURE_DEVICE_SIMULATOR_FUNCTION_NAME }}.azurewebsites.net/api/device/simulate?code=...\`" >> "$GITHUB_STEP_SUMMARY"
