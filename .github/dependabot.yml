# Dependabot (filename must stay dependabot.yml). Opens weekly PRs to bump:
# - GitHub Actions in /.github/workflows
# - npm in /web and /mobile
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
